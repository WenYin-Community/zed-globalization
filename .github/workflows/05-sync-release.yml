name: 05 同步上游二进制包并触发 COPR 构建

on:
  schedule:
    - cron: "0 1 */3 * *"  # 每3天同步一次
  workflow_dispatch:

concurrency:
  group: sync-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  UPSTREAM_REPO: x6nux/zed-globalization

jobs:
  sync:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: 安装基础工具
        run: |
          pacman -Syu --noconfirm base-devel git jq curl openssh github-cli python-pip nodejs
          git config --global --add safe.directory /__w/zed-globalization/zed-globalization

      - uses: actions/checkout@v4

      - name: 检测上游最新版本
        id: check
        run: |
          LATEST=$(curl -sf "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest" | jq -r '.tag_name')
          echo "上游最新版本: $LATEST"

          LOCAL=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" | jq -r '.[0].tag_name // empty')
          echo "本地最新版本: ${LOCAL:-无}"

          if [ "$LATEST" = "$LOCAL" ]; then
            echo "版本相同，无需同步"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "需要同步: $LOCAL -> $LATEST"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: 下载上游 tar.gz 并上传到本仓库 Release
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${VERSION#v}"
          mkdir -p assets

          for arch in x86_64 aarch64; do
            FILE="zedg-zh-cn-linux-${arch}-${VERSION}.tar.gz"
            URL="https://github.com/${{ env.UPSTREAM_REPO }}/releases/download/${VERSION}/${FILE}"
            echo "下载: $URL"
            curl -fSL "$URL" -o "assets/${FILE}"
          done

          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "ZedG $VERSION" \
            --notes "Synced from ${{ env.UPSTREAM_REPO }} $VERSION" \
            assets/*.tar.gz

          # 更新打包文件版本号
          sed -i "s/^Version:.*/Version:        $VER/" packaging/rpm/zedg-copr.spec
          sed -i "s/^Version:.*/Version:        $VER/" packaging/rpm/zedg-copr-aarch64.spec
          sed -i "s/^pkgver=.*/pkgver=$VER/" packaging/archlinux/PKGBUILD

          X86_SUM=$(sha256sum "assets/zedg-zh-cn-linux-x86_64-${VERSION}.tar.gz" | awk '{print $1}')
          AARCH64_SUM=$(sha256sum "assets/zedg-zh-cn-linux-aarch64-${VERSION}.tar.gz" | awk '{print $1}')
          sed -i "s/sha256sums_x86_64=('.*')/sha256sums_x86_64=('$X86_SUM')/" packaging/archlinux/PKGBUILD
          sed -i "s/sha256sums_aarch64=('.*')/sha256sums_aarch64=('$AARCH64_SUM')/" packaging/archlinux/PKGBUILD

      - name: 生成 .SRCINFO
        if: steps.check.outputs.skip != 'true'
        run: |
          useradd -m builder
          BUILDDIR=$(mktemp -d)
          cp packaging/archlinux/PKGBUILD "$BUILDDIR/"
          chown -R builder:builder "$BUILDDIR"
          sudo -u builder sh -c "cd $BUILDDIR && makepkg --printsrcinfo" > packaging/archlinux/.SRCINFO
          rm -rf "$BUILDDIR"

      - name: 提交打包文件更新
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          VER="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/rpm/zedg-copr.spec packaging/rpm/zedg-copr-aarch64.spec packaging/archlinux/PKGBUILD packaging/archlinux/.SRCINFO
          git diff --cached --quiet || git commit -m "chore: 更新打包文件版本号至 $VER"
          git push

      - name: 触发 COPR 构建
        if: steps.check.outputs.skip != 'true'
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
        run: |
          if [ -z "$COPR_TOKEN" ]; then
            echo "未配置 COPR_TOKEN，跳过 COPR 构建触发"
            exit 0
          fi

          pip install --break-system-packages copr-cli rich

          mkdir -p ~/.config
          cat > ~/.config/copr <<CFG
          [copr-cli]
          username = ${COPR_USERNAME:-ruojiner}
          login = $COPR_LOGIN
          token = $COPR_TOKEN
          copr_url = https://copr.fedorainfracloud.org
          CFG

          copr-cli build --nowait \
            -r fedora-44-x86_64 -r fedora-43-x86_64 -r rhel-10-x86_64 \
            ruojiner/zedg packaging/rpm/zedg-copr.spec

          copr-cli build --nowait \
            -r fedora-44-aarch64 -r fedora-43-aarch64 -r rhel-10-aarch64 \
            ruojiner/zedg packaging/rpm/zedg-copr-aarch64.spec

      - name: 推送到 AUR
        if: steps.check.outputs.skip != 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "未配置 AUR_SSH_PRIVATE_KEY，跳过 AUR 推送"
            exit 0
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git clone ssh://aur@aur.archlinux.org/zedg.git /tmp/aur-pkg
          cp packaging/archlinux/PKGBUILD packaging/archlinux/.SRCINFO /tmp/aur-pkg/
          cd /tmp/aur-pkg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${{ steps.check.outputs.version }}"
          git push
